<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based Dropout Prediction System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="left">

        <h1>AI-Based</h1>
        <h2>Dropout Prediction</h2>

        <p>
            Predict students at risk of dropping out and provide
            personalized counseling recommendations using AI.
        </p>

    </div>

    <div class="right">

        <h2>Login</h2>

        <form id="loginForm">

            <label>Email</label>

            <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required>

            <label>Password</label>

            <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required>

            <label>User Type</label>

            <select id="role" required>

    <option value="">Select User</option>

    <option value="Admin">Admin</option>
    <option value="Faculty">Faculty</option>
    <option value="Student">Student</option>

</select>

            <button type="submit">

                Login

            </button>

        </form>

        <p>

            New User?

            <a href="register1.html">

                Register Here

            </a>

        </p>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
