<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Registration</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="left">

<h1>Student Registration</h1>

<h2>AI-Based Dropout Prediction System</h2>

<p>
Create your account to register student information,
predict dropout risk, and receive personalized
counseling recommendations.
</p>

</div>

<div class="right">

<h2>Email Registration</h2>

<form id="registerForm">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter your Email"
required>

<label>Password</label>

<input
type="password"
id="password"
placeholder="Create Password"
required>

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

<button type="submit">

Continue

</button>

</form>

<p>

Already Registered?

<a href="index.html">

Login Here

</a>

</p>

</div>

</div>

<script src="js/register1.js"></script>

</body>

</html>
