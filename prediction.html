<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<link rel="stylesheet" href="css/prediction.css">

</head>

<body>

<div class="container">

    <h1>🤖 AI-Based Dropout Prediction</h1>

    <div class="card">

        <h2>Student Information</h2>

        <p><strong>ID :</strong> <span id="sid"></span></p>

        <p><strong>Name :</strong> <span id="sname"></span></p>

        <p><strong>Department :</strong> <span id="sdepartment"></span></p>

        <p><strong>Attendance :</strong> <span id="attendance"></span></p>

        <p><strong>CGPA :</strong> <span id="cgpa"></span></p>

        <p><strong>Internal Marks :</strong> <span id="marks"></span></p>

        <p><strong>Backlogs :</strong> <span id="backlogs"></span></p>

    </div>

    <div class="card">

        <h2>Prediction Result</h2>

        <h1 id="risk"></h1>

        <p id="reason"></p>

    </div>

    <div class="card">

        <h2>Counseling Recommendation</h2>

        <p id="advice"></p>

    </div>

    <button>💬 Continue to Counseling</button>
</a>
